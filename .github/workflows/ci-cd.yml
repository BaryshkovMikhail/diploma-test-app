# ============================================================
# GitHub Actions: CI/CD для тестового приложения
# Файл: .github/workflows/ci-cd.yml
# ============================================================

name: Build and Deploy App

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: nastya2005/diploma-test-app

jobs:
  build-and-push:
    name: 'Build and Push Image'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=sha,prefix=,format=long
          type=ref,event=branch
          type=raw,value=latest,enable={{is_default_branch}}
          type=raw,value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Output image info
      run: |
        echo "✅ Image pushed: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
        echo "✅ Tags: ${{ steps.meta.outputs.tags }}"

  deploy-to-k8s:
    name: 'Deploy to Kubernetes'
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'release'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Configure kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
        chmod 600 ~/.kube/config

    - name: Update image in deployment
      run: |
        NEW_TAG="${{ github.event.release.tag_name }}"
        echo "🚀 Deploying version: $NEW_TAG"
        
        kubectl set image deployment/diploma-test-app \
          nginx=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${NEW_TAG} \
          --record
        
        echo "⏳ Waiting for rollout..."
        kubectl rollout status deployment/diploma-test-app --timeout=300s
        
        echo "✅ Deployment complete!"

    - name: Verify deployment
      run: |
        echo "📋 Current pods:"
        kubectl get pods -l app=diploma-test-app
        
        echo "📋 Deployment info:"
        kubectl describe deployment diploma-test-app | grep "Image:"
